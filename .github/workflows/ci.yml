name: CI
on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install (root)
        run: npm ci --no-fund --no-audit
      - name: Install (media-src)
        run: npm --prefix media-src ci --no-fund --no-audit

      # Security gate: fail the build on known vulnerabilities (moderate+).
      - name: Audit (root)
        run: npm audit --audit-level=moderate
      - name: Audit (media-src)
        run: npm --prefix media-src audit --audit-level=moderate

      # Compiles the host with tsc (type-checks it) and bundles the webview.
      - name: Build
        run: node build.mjs

      - name: Unit tests
        run: npm test

      # Cache the browser binaries (~290 MB) so they download once. The GitHub
      # ubuntu runner already ships Playwright's OS libs (only fonts would be new
      # via --with-deps, which our headless tests don't need), so we skip apt.
      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('media-src/package-lock.json') }}
      - name: Install Playwright chromium
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npm --prefix media-src exec -- playwright install chromium
      - name: E2e tests
        run: npm --prefix media-src run test:e2e
